{% extends "stock/base.html" %}

{% block body %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-success text-white text-center py-4 border-0" style="border-radius: 12px 12px 0 0;">
                <i class="bi bi-person-plus-fill fs-1"></i>
                <h4 class="mt-2 fw-bold">开启 StockX 交易之旅</h4>
                <div class="badge bg-light text-success fw-bold">注册即领 ¥100,000.00 模拟金</div>
            </div>

            <div class="card-body p-4 p-md-5">
                {% if message %}
                    <div class="alert alert-warning d-flex align-items-center" role="alert">
                        <i class="bi bi-exclamation-circle-fill me-2"></i>
                        <div>{{ message }}</div>
                    </div>
                {% endif %}

                <form action="{% url 'register' %}" method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">账户用户名</label>
                        <input class="form-control bg-light" type="text" name="username" placeholder="建议使用英文或数字" required autofocus>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">电子邮箱</label>
                        <input class="form-control bg-light" type="email" name="email" placeholder="example@mail.com" required>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">设置密码</label>
                            <input class="form-control bg-light" type="password" name="password" placeholder="不少于6位" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">确认密码</label>
                            <input class="form-control bg-light" type="password" name="confirmation" placeholder="再次输入密码" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">性别</label>
                        <select class="form-select bg-light" name="gender">
                            <option value="Male" selected>男</option>
                            <option value="Female">女</option>
                            <option value="Other">其他</option>
                        </select>
                    </div>

                    <button class="btn btn-success w-100 py-2 fw-bold shadow-sm mb-3" type="submit">
                        创建账号并获取资金
                    </button>
                </form>

                <hr class="my-4">

                <div class="text-center">
                    <p class="text-muted small mb-0">已经拥有账号？</p>
                    <a href="{% url 'login' %}" class="text-success fw-bold text-decoration-none">返回登录界面</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
